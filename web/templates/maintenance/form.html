{% extends "base.html" %}

{% block title %}{{ "Neue Wartung" if not is_edit else "Wartung bearbeiten" }}{% endblock %}

{% block content %}
<div class="mb-6">
    <nav class="text-sm text-gray-500 mb-2">
        <a href="/maintenance" class="hover:text-blue-500">Wartung</a>
        <i class="fas fa-chevron-right mx-2 text-xs"></i>
        <span class="text-gray-700">{{ "Neue Wartung" if not is_edit else "Bearbeiten" }}</span>
    </nav>
</div>

<div class="bg-white rounded-xl shadow-md">
    <div class="p-6 border-b border-gray-100">
        <h1 class="text-xl font-bold text-gray-800">
            <i class="fas fa-wrench mr-2 text-orange-500"></i>
            {{ "Wartung planen" if not is_edit else "Wartung bearbeiten" }}
        </h1>
    </div>
    
    <form action="/maintenance/new" method="post" class="p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Art der Arbeit *</label>
                <input type="text" name="task_type" required value="{{ maintenance.task_type if maintenance else "" }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                    placeholder="z.B. Heizungswartung, Malerarbeiten">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Priorität</label>
                <select name="priority" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500">
                    <option value="low" {{ 'selected' if maintenance and maintenance.priority == 'low' }}>Niedrig</option>
                    <option value="medium" {{ 'selected' if not maintenance or maintenance.priority == 'medium' }}>Normal</option>
                    <option value="high" {{ 'selected' if maintenance and maintenance.priority == 'high' }}>Hoch</option>
                    <option value="urgent" {{ 'selected' if maintenance and maintenance.priority == 'urgent' }}>Dringend</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Immobilie</label>
                <select name="property_id" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500">
                    <option value="">-- Kein Objekt --</option>
                    {% for p in properties %}
                    <option value="{{ p.id }}" {{ 'selected' if maintenance and maintenance.property_id == p.id }}>{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Geplantes Datum</label>
                <input type="date" name="scheduled_date" value="{{ maintenance.scheduled_date if maintenance else "" }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Handwerker</label>
                <select name="contractor_id" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500">
                    <option value="">-- Kein Handwerker --</option>
                    {% for c in contractors %}
                    <option value="{{ c.id }}" {{ 'selected' if maintenance and maintenance.contractor_id == c.id }}>{{ c.name }} ({{ c.trade }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kosten (€)</label>
                <input type="number" name="cost" value="{{ maintenance.cost if maintenance else "" }}" step="0.01"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500">
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Beschreibung</label>
                <textarea name="description" rows="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500"
                    placeholder="Details zur Wartung...">{{ maintenance.description if maintenance else "" }}</textarea>
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Notizen</label>
                <textarea name="notes" rows="2"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500"
                    placeholder="Interne Notizen...">{{ maintenance.notes if maintenance else "" }}</textarea>
            </div>
        </div>
        
        <div class="mt-6 flex justify-end space-x-3">
            <a href="/maintenance" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                Abbrechen
            </a>
            <button type="submit" class="px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600">
                <i class="fas fa-save mr-1"></i>Wartung planen
            </button>
        </div>
    </form>
</div>
{% endblock %}
